name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build universal binary
        run: |
          swift build -c release --arch arm64 --arch x86_64

      - name: Create .app bundle
        run: |
          APP="TrueAuth.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp .build/apple/Products/Release/TrueAuth "$APP/Contents/MacOS/" 2>/dev/null || cp .build/release/TrueAuth "$APP/Contents/MacOS/"
          cp Info.plist "$APP/Contents/"
          cp Resources/AppIcon.icns "$APP/Contents/Resources/" 2>/dev/null || true

      - name: Create DMG
        run: |
          mkdir -p dmg-staging
          cp -R TrueAuth.app dmg-staging/
          ln -s /Applications dmg-staging/Applications
          hdiutil create -volname "TrueAuth" -srcfolder dmg-staging -ov -format UDZO TrueAuth.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: TrueAuth-macOS
          path: TrueAuth.dmg

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TrueAuth-macOS/TrueAuth.dmg
          body: |
            ## TrueAuth v1.0.0

            A lightweight macOS TOTP 2FA authenticator built with SwiftUI.

            ### Features
            - TOTP code generation (RFC 6238)
            - QR code import from images
            - Edit / delete profiles
            - Encrypted storage (ChaChaPoly + Keychain)
            - Export as plain text or encrypted backup
            - Secret validation indicator

            ### Install
            1. Download `TrueAuth.dmg`
            2. Open the DMG and drag TrueAuth to Applications
            3. Launch TrueAuth

            > **Note:** macOS only. Uses native macOS APIs (Keychain, CoreImage, AppKit).
